<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Attendance Scanner</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header>
            <h1>📱 Attendance</h1>
            <div class="status" id="status">● Online</div>
        </header>

        <!-- Room Selection -->
        <div class="rooms">
            <button class="room active" data-room="A">A</button>
            <button class="room" data-room="B">B</button>
            <button class="room" data-room="C">C</button>
            <button class="room" data-room="D">D</button>
        </div>

        <!-- Scanner -->
        <div class="scanner-box">
            <div id="scanner"></div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <button id="startBtn" class="btn btn-start">▶ Start Camera</button>
            <button id="stopBtn" class="btn btn-stop" style="display:none;">⬛ Stop</button>
        </div>

        <!-- Manual Entry -->
        <div class="manual">
            <input type="text" id="codeInput" placeholder="Enter code manually...">
            <button id="submitBtn">Submit</button>
        </div>

        <!-- Result -->
        <div id="result" class="result"></div>

        <!-- Live Count -->
        <div class="stats">
            <span>Today: <strong id="count">0</strong></span>
            <button id="refreshBtn">🔄</button>
        </div>

        <!-- Recent Scans (Live Sync) -->
        <div class="recent">
            <h3>Recent Scans (Live)</h3>
            <div id="recentList"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
