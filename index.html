<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Attendance Scanner</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <header>
            <h1>📱 Attendance</h1>
            <span id="status" class="online">● Online</span>
        </header>

        <div class="rooms" id="rooms">
            <button class="room active" data-room="Room A">A</button>
            <button class="room" data-room="Room B">B</button>
            <button class="room" data-room="Room C">C</button>
            <button class="room" data-room="Room D">D</button>
        </div>

        <div class="scanner-box">
            <div id="scanner"></div>
            <div id="placeholder" class="placeholder">
                <span>📷</span>
                <p>Click Start to open camera</p>
            </div>
        </div>

        <div class="buttons">
            <button id="startBtn" class="btn green">▶ Start Camera</button>
            <button id="stopBtn" class="btn red" style="display:none">⏹ Stop</button>
        </div>

        <div class="manual-box">
            <input type="text" id="manualInput" placeholder="Type student code...">
            <button id="manualBtn" class="btn blue">Submit</button>
        </div>

        <div id="message" class="message"></div>

        <div class="stats-box">
            <div>Today: <strong id="totalCount">0</strong></div>
            <button id="refreshBtn" class="btn-small">🔄 Refresh</button>
        </div>

        <div class="recent-box">
            <h3>📋 Live Scans</h3>
            <div id="recentList"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
