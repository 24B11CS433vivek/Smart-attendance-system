<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#667eea">
    <title>📊 Attendance Dashboard</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* Dashboard Specific Styles */
        .dashboard-header {
            text-align: center;
            padding: var(--spacing-lg);
            background: var(--accent-gradient);
            border-radius: var(--radius-xl);
            margin-bottom: var(--spacing-lg);
            color: white;
        }
        
        .dashboard-header h1 {
            font-size: 1.5rem;
            margin-bottom: var(--spacing-sm);
        }
        
        .dashboard-date {
            opacity: 0.9;
            font-size: 0.875rem;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-lg);
        }
        
        .stat-card {
            background: var(--bg-secondary);
            border-radius: var(--radius-xl);
            padding: var(--spacing-lg);
            text-align: center;
            box-shadow: var(--shadow-md);
            transition: transform var(--transition-fast);
        }
        
        .stat-card:hover {
            transform: translateY(-4px);
        }
        
        .stat-card.primary {
            grid-column: span 2;
            background: var(--accent-gradient);
            color: white;
        }
        
        .stat-number {
            font-size: 2.5rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: var(--spacing-sm);
        }
        
        .stat-card.primary .stat-number {
            font-size: 3.5rem;
        }
        
        .stat-label {
            font-size: 0.875rem;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-lg);
        }
        
        .room-stat-card {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            padding: var(--spacing-md);
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            box-shadow: var(--shadow-sm);
        }
        
        .room-stat-icon {
            width: 50px;
            height: 50px;
            background: var(--bg-tertiary);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent-primary);
        }
        
        .room-stat-info h3 {
            font-size: 1.5rem;
            font-weight: 700;
            line-height: 1;
            color: var(--text-primary);
        }
        
        .room-stat-info p {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        
        .chart-section {
            background: var(--bg-secondary);
            border-radius: var(--radius-xl);
            padding: var(--spacing-lg);
            margin-bottom: var(--spacing-lg);
            box-shadow: var(--shadow-md);
        }
        
        .chart-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: var(--spacing-md);
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }
        
        .chart-bars {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-sm);
        }
        
        .chart-bar {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
        }
        
        .chart-bar-label {
            width: 60px;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-secondary);
        }
        
        .chart-bar-track {
            flex: 1;
            height: 24px;
            background: var(--bg-tertiary);
            border-radius: var(--radius-full);
            overflow: hidden;
        }
        
        .chart-bar-fill {
            height: 100%;
            background: var(--accent-gradient);
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: var(--spacing-sm);
            font-size: 0.75rem;
            font-weight: 600;
            color: white;
            min-width: 30px;
            transition: width 1s ease;
        }
        
        .live-feed {
            background: var(--bg-secondary);
            border-radius: var(--radius-xl);
            padding: var(--spacing-lg);
            box-shadow: var(--shadow-md);
        }
        
        .live-indicator {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-md);
        }
        
        .live-dot {
            width: 10px;
            height: 10px;
            background: var(--error-color);
            border-radius: 50%;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .live-feed-list {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-sm);
            color: var(--accent-primary);
            text-decoration: none;
            font-weight: 500;
            margin-bottom: var(--spacing-md);
        }
        
        .back-link:hover {
            color: var(--accent-secondary);
        }
        
        .auto-refresh-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-tertiary);
            padding: var(--spacing-md);
            border-radius: var(--radius-lg);
            margin-bottom: var(--spacing-lg);
        }
        
        .toggle-switch {
            position: relative;
            width: 50px;
            height: 26px;
            background: var(--border-color);
            border-radius: var(--radius-full);
            cursor: pointer;
            transition: background var(--transition-fast);
        }
        
        .toggle-switch.active {
            background: var(--accent-primary);
        }
        
        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            transition: transform var(--transition-fast);
        }
        
        .toggle-switch.active::after {
            transform: translateX(24px);
        }
        
        .last-updated {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-tertiary);
            margin-top: var(--spacing-md);
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <i class="fas fa-moon"></i>
    </button>
    
    <div class="container">
        <a href="index.html" class="back-link">
            <i class="fas fa-arrow-left"></i>
            Back to Scanner
        </a>
        
        <header class="dashboard-header">
            <h1><i class="fas fa-chart-pie"></i> Attendance Dashboard</h1>
            <p class="dashboard-date" id="currentDate"></p>
        </header>
        
        <!-- Auto Refresh Toggle -->
        <div class="auto-refresh-toggle">
            <div>
                <strong>Auto Refresh</strong>
                <p style="font-size: 0.75rem; color: var(--text-secondary);">Updates every 10 seconds</p>
            </div>
            <div class="toggle-switch active" id="autoRefreshToggle"></div>
        </div>
        
        <!-- Main Stats -->
        <div class="stats-grid">
            <div class="stat-card primary">
                <div class="stat-number" id="totalCount">0</div>
                <div class="stat-label">Total Attendance Today</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="roomsActive">0</div>
                <div class="stat-label">Active Rooms</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="lastHourCount">0</div>
                <div class="stat-label">Last Hour</div>
            </div>
        </div>
        
        <!-- Room Stats -->
        <h2 class="chart-title">
            <i class="fas fa-door-open"></i>
            Room-wise Attendance
        </h2>
        <div class="rooms-grid" id="roomsGrid">
            <!-- Room cards will be inserted here -->
        </div>
        
        <!-- Hourly Distribution Chart -->
        <section class="chart-section">
            <h2 class="chart-title">
                <i class="fas fa-clock"></i>
                Hourly Distribution
            </h2>
            <div class="chart-bars" id="hourlyChart">
                <!-- Chart bars will be inserted here -->
            </div>
        </section>
        
        <!-- Live Feed -->
        <section class="live-feed">
            <div class="live-indicator">
                <div class="live-dot"></div>
                <strong>Live Feed</strong>
            </div>
            <div class="live-feed-list" id="liveFeed">
                <!-- Live scans will be inserted here -->
            </div>
        </section>
        
        <p class="last-updated" id="lastUpdated">Last updated: --</p>
    </div>
    
    <script src="dashboard.js"></script>
</body>
</html>
